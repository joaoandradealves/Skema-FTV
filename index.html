<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skema Beach Club</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "51486d1b-db76-4996-b5bd-1c88bcb14835",
          safari_web_id: "web.onesignal.auto.103737cb-d76f-40e1-aaa3-66170685600c",
          notifyButton: {
            enable: false,
          },
          allowLocalhostAsSecureOrigin: true,
          serviceWorkerPath: '/OneSignalSDKWorker-v2.js',
          serviceWorkerParam: { scope: '/' },
          siteName: 'Skema Beach Club'
        });
      });
    </script>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#006971">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script>
      console.log('%c[SKEMA DIAGNÓSTICO] Página carregada, iniciando verificações...', 'color: cyan; font-weight: bold;');
      
      // Monitorar falhas de rede de scripts
      window.addEventListener('error', function(e) {
        if (e.target.tagName === 'SCRIPT') {
          console.error('[SKEMA ERROR] Falha ao carregar script:', e.target.src);
          const feedback = document.createElement('div');
          feedback.style = 'position:fixed; top:0; left:0; right:0; background:rgba(255,0,0,0.9); color:white; padding:10px; z-index:9999; text-align:center;';
          feedback.innerHTML = '<b>Atenção:</b> Falha na conexão com o servidor. Verifique seu Hotspot/Internet.';
          document.body.appendChild(feedback);
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
